<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Checklist">
    <meta name="theme-color" content="#1F2937">
    
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%233B82F6' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dy='.3em'>✓</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%233B82F6' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dy='.3em'>✓</text></svg>">
    
    <title>Daily Checklist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111827;
            color: #F3F4F6;
        }

        body {
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 0.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .view-toggle {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .view-toggle button {
            background: transparent;
            border: 1px solid #374151;
            color: #9CA3AF;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .view-toggle button.active {
            background: #3B82F6;
            color: white;
            border-color: #3B82F6;
        }

        .section { display: none; }
        .section.active { display: block; }

        .container-box {
            background: #1F2937;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .checklist-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
        }

        .checklist-date {
            font-size: 13px;
            color: #9CA3AF;
            margin: 0 0 1rem 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #111827;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10B981, #3B82F6);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #9CA3AF;
            text-align: center;
            margin-bottom: 1rem;
        }

        .status-alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 13px;
            display: none;
        }

        .status-alert.show { display: block; }
        .status-alert.crushing { background: #D1FAE5; color: #065F46; border-left: 4px solid #10B981; }
        .status-alert.at-risk { background: #FEE2E2; color: #7F1D1D; border-left: 4px solid #EF4444; }

        .checklist-items {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            padding: 1rem;
            background: #111827;
            border-radius: 6px;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .checklist-item.completed { opacity: 0.6; }
        .checklist-item.active-timer { border-color: #F59E0B; background: #1F2937; }

        .checkbox {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 2px solid #3B82F6;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            background: transparent;
            margin-top: 0.2rem;
        }

        .checklist-item.completed .checkbox { background: #3B82F6; }

        .activity-info { flex: 1; }
        .activity-name { font-size: 14px; font-weight: 500; color: #F3F4F6; margin: 0 0 0.3rem 0; }
        .checklist-item.completed .activity-name { text-decoration: line-through; color: #9CA3AF; }
        .activity-time { font-size: 12px; color: #9CA3AF; margin: 0; }
        .activity-streak { font-size: 11px; color: #F59E0B; font-weight: 500; margin-top: 0.2rem; }

        .timer-display {
            font-size: 16px;
            font-weight: 600;
            color: #F59E0B;
            margin-top: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        .timer-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .timer-btn {
            padding: 0.3rem 0.6rem;
            font-size: 10px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .timer-btn.stop { background: #EF4444; }

        textarea {
            width: 100%;
            min-height: 80px;
            padding: 0.6rem;
            border: 1px solid #374151;
            border-radius: 4px;
            background: #111827;
            color: #F3F4F6;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
        }

        textarea:focus { outline: none; border-color: #3B82F6; }

        .motivational-message {
            text-align: center;
            padding: 1rem;
            background: #111827;
            border-radius: 6px;
            font-size: 14px;
            color: #9CA3AF;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: #111827;
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #3B82F6;
            margin: 0.5rem 0;
        }

        .stat-label {
            font-size: 11px;
            color: #9CA3AF;
            margin: 0;
        }

        .stat-streak {
            font-size: 10px;
            color: #F59E0B;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .insight-card {
            background: #111827;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            border-left: 4px solid #3B82F6;
        }

        .insight-title {
            font-size: 13px;
            font-weight: 600;
            color: #F3F4F6;
            margin: 0 0 0.5rem 0;
        }

        .insight-text {
            font-size: 12px;
            color: #9CA3AF;
            line-height: 1.5;
            margin: 0;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #374151;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }


    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Daily Checklist</h1>
            <div class="view-toggle">
                <button class="active" onclick="switchView('checklist')">Today</button>
                <button onclick="switchView('tracker')">Tracker</button>
                <button onclick="switchView('insights')">AI</button>
            </div>
        </div>

        <!-- TODAY -->
        <div id="checklistSection" class="section active">
            <div class="container-box">
                <h2 class="checklist-title" id="checklistTitle">Today's Schedule</h2>
                <p class="checklist-date" id="checklistDate">Loading...</p>

                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
                <div class="progress-text" id="progressText">0% Complete</div>

                <div id="statusAlerts"></div>
                <div class="checklist-items" id="checklistItems"></div>

                <div style="background: #111827; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
                    <label style="font-size: 12px; font-weight: 500; color: #9CA3AF; display: block; margin-bottom: 0.5rem;">Daily Notes</label>
                    <textarea id="dailyNotes" placeholder="How did today go?"></textarea>
                </div>

                <div class="motivational-message" id="motivationalMessage">Start checking off your tasks! 🎯</div>
            </div>
        </div>

        <!-- TRACKER -->
        <div id="trackerSection" class="section">
            <div class="container-box">
                <h2 class="checklist-title">Your Success Tracker</h2>
                <p style="font-size: 12px; color: #9CA3AF; margin-bottom: 1rem;">Last 7 days</p>
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </div>

        <!-- AI INSIGHTS -->
        <div id="insightsSection" class="section">
            <div class="container-box">
                <h2 class="checklist-title">🤖 AI Insights</h2>
                <div id="insightsContent">
                    <div style="text-align: center; padding: 2rem;">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; font-size: 12px; color: #9CA3AF;">Analyzing your habits...</p>
                    </div>
                </div>
            </div>
        </div>


    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
            `));
        }

        const motivationalMessages = [
            { threshold: 0, message: '💸 Going into debt' },
            { threshold: 20, message: '📉 Still losing' },
            { threshold: 40, message: '⚖️ Might break even' },
            { threshold: 60, message: '📈 Slightly in positive' },
            { threshold: 80, message: '💰 Getting ahead' },
            { threshold: 100, message: '🤑 Gonna be a billionaire!' }
        ];

        const trackedActivities = [
            { id: 'a3', name: 'Dials', emoji: '📞', isQuantity: true },
            { id: 'a6', name: 'Reading', emoji: '📖', isQuantity: false },
            { id: 'a0', name: 'Cardio', emoji: '🏃', isQuantity: false },
            { id: 'a1', name: 'Maker Time', emoji: '⚙️', isQuantity: false },
            { id: 'a2', name: 'Call Training', emoji: '🎓', isQuantity: false },
            { id: 'a5', name: 'Lifting', emoji: '💪', isQuantity: false },
            { id: 'a4', name: 'Audits', emoji: '📊', isQuantity: false },
            { id: 'a7', name: 'Sleep', emoji: '😴', isQuantity: false }
        ];

        let currentViewDate = new Date();
        let activeTimer = null;
        let timerInterval = null;

        function getDailyActivities(date) {
            const dayOfWeek = date.getDay();
            if (dayOfWeek >= 1 && dayOfWeek <= 6) {
                return [
                    { id: 'a0', time: '05:30', name: 'Cardio/Stretch (Mindset)', duration: 60 },
                    { id: 'a1', time: '06:30', name: 'Maker Time', duration: 100 },
                    { id: 'a2', time: '08:10', name: 'Call Recording Training', duration: 50 },
                    { id: 'a3', time: '09:00', name: 'Revenue Generation (Calling)', duration: 660 },
                    { id: 'a4', time: '20:00', name: 'Audit Closer\'s Day', duration: 5 },
                    { id: 'a5', time: '20:05', name: 'Lift/Cardio', duration: 55 },
                    { id: 'a6', time: '21:00', name: 'Read & Get Ready for Bed', duration: 60 },
                    { id: 'a7', time: '22:00', name: 'Sleep', duration: 450 }
                ];
            } else if (dayOfWeek === 0) {
                return [{ id: 's0', time: '09:00', name: 'Revenue Generation (Calling)', duration: 660 }];
            }
            return [];
        }

        function formatDuration(minutes) {
            if (minutes >= 60) {
                const hours = Math.floor(minutes / 60);
                const mins = minutes % 60;
                return mins === 0 ? hours + ' hr' : hours + 'h ' + mins + 'm';
            }
            return minutes + ' min';
        }

        function formatTimer(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }

        function getTimeRemaining() {
            const now = new Date();
            const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
            const msRemaining = endOfDay - now;
            return { hoursRemaining: Math.floor(msRemaining / (1000 * 60 * 60)), minutesRemaining: Math.floor((msRemaining % (1000 * 60 * 60)) / (1000 * 60)) };
        }

        function calculateStreak(activityId) {
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const checkDate = new Date();
                checkDate.setDate(checkDate.getDate() - i);
                const activities = getDailyActivities(checkDate);
                if (!activities.some(a => a.id === activityId)) continue;
                const checklist = JSON.parse(localStorage.getItem(`checklist_${checkDate.toISOString().split('T')[0]}`) || '{}');
                if (checklist[activityId]) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }

        function renderChecklist() {
            const activities = getDailyActivities(currentViewDate);
            const checklist = JSON.parse(localStorage.getItem(`checklist_${currentViewDate.toISOString().split('T')[0]}`) || '{}');
            
            const dateStr = currentViewDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('checklistTitle').textContent = 'Today\'s Schedule';
            document.getElementById('checklistDate').textContent = dateStr;
            
            let completedCount = 0;
            const html = activities.map(activity => {
                const isCompleted = checklist[activity.id];
                if (isCompleted) completedCount++;
                
                const streak = calculateStreak(activity.id);
                const timerState = JSON.parse(localStorage.getItem(`timer_${currentViewDate.toISOString().split('T')[0]}_${activity.id}`) || '{"elapsed":0,"running":false}');
                
                return `
                    <div class="checklist-item ${isCompleted ? 'completed' : ''} ${timerState.running ? 'active-timer' : ''}" onclick="toggleTask('${activity.id}')">
                        <div class="checkbox">${isCompleted ? '✓' : ''}</div>
                        <div class="activity-info">
                            <p class="activity-name">${activity.name}</p>
                            <p class="activity-time">${activity.time} • ${formatDuration(activity.duration)}</p>
                            ${streak > 0 ? `<div class="activity-streak">🔥 ${streak}</div>` : ''}
                            <div class="timer-display">${formatTimer(timerState.elapsed)}</div>
                            <div class="timer-buttons">
                                <button class="timer-btn" onclick="event.stopPropagation(); ${timerState.running ? 'stopTimer()' : `startTimer('${activity.id}')`}">${timerState.running ? 'Pause' : 'Start'}</button>
                                <button class="timer-btn stop" onclick="event.stopPropagation(); resetTimer('${activity.id}')">Reset</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('checklistItems').innerHTML = html;
            
            const pct = activities.length > 0 ? Math.round((completedCount / activities.length) * 100) : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '% Complete';
            document.getElementById('motivationalMessage').textContent = motivationalMessages.find((m, i, arr) => pct >= m.threshold && (i === arr.length - 1 || pct < arr[i + 1].threshold))?.message || '🎯';
        }

        function toggleTask(taskId) {
            const checklist = JSON.parse(localStorage.getItem(`checklist_${currentViewDate.toISOString().split('T')[0]}`) || '{}');
            checklist[taskId] = !checklist[taskId];
            localStorage.setItem(`checklist_${currentViewDate.toISOString().split('T')[0]}`, JSON.stringify(checklist));
            renderChecklist();
        }

        function startTimer(activityId) {
            if (activeTimer === activityId) return;
            if (activeTimer) stopTimer();
            activeTimer = activityId;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const key = `timer_${currentViewDate.toISOString().split('T')[0]}_${activityId}`;
                const state = JSON.parse(localStorage.getItem(key) || '{"elapsed":0,"running":false}');
                state.elapsed++;
                state.running = true;
                localStorage.setItem(key, JSON.stringify(state));
                renderChecklist();
            }, 1000);
            renderChecklist();
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            if (activeTimer) {
                const key = `timer_${currentViewDate.toISOString().split('T')[0]}_${activeTimer}`;
                const state = JSON.parse(localStorage.getItem(key) || '{"elapsed":0,"running":false}');
                state.running = false;
                localStorage.setItem(key, JSON.stringify(state));
            }
            activeTimer = null;
            renderChecklist();
        }

        function resetTimer(activityId) {
            const key = `timer_${currentViewDate.toISOString().split('T')[0]}_${activityId}`;
            localStorage.setItem(key, JSON.stringify({ elapsed: 0, running: false }));
            if (activeTimer === activityId) stopTimer();
            renderChecklist();
        }

        function renderTracker() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 7);
            
            const stats = {};
            trackedActivities.forEach(a => { stats[a.id] = { completed: 0, total: 0, streak: 0 }; });
            
            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const activities = getDailyActivities(d);
                const checklist = JSON.parse(localStorage.getItem(`checklist_${d.toISOString().split('T')[0]}`) || '{}');
                activities.forEach(a => {
                    if (stats[a.id]) {
                        stats[a.id].total++;
                        if (checklist[a.id]) stats[a.id].completed++;
                    }
                });
            }
            
            trackedActivities.forEach(a => { stats[a.id].streak = calculateStreak(a.id); });
            
            const html = trackedActivities.map(a => {
                const s = stats[a.id];
                const pct = s.total > 0 ? Math.round((s.completed / s.total) * 100) : 0;
                return `<div class="stat-card"><div style="font-size: 20px;">${a.emoji}</div><div class="stat-value">${pct}%</div><p class="stat-label">${a.name}</p><div style="font-size: 10px; color: #9CA3AF;">${s.completed}/${s.total}</div>${s.streak > 0 ? `<div class="stat-streak">🔥 ${s.streak}</div>` : ''}</div>`;
            }).join('');
            
            document.getElementById('statsGrid').innerHTML = html;
        }

        async function renderInsights() {
            const content = document.getElementById('insightsContent');
            const last7 = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const activities = getDailyActivities(d);
                const checklist = JSON.parse(localStorage.getItem(`checklist_${d.toISOString().split('T')[0]}`) || '{}');
                const completed = activities.filter(a => checklist[a.id]).length;
                const pct = activities.length > 0 ? Math.round((completed / activities.length) * 100) : 0;
                last7.push(pct);
            }
            
            const prompt = `User's completion % last 7 days: ${last7.reverse().join(', ')}%. Activity streaks: ${trackedActivities.map(a => a.name + ':' + calculateStreak(a.id)).join(', ')}. Give 2-3 short insights on patterns and what to improve. Keep each insight to 1-2 sentences.`;
            
            try {
                const resp = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 500, messages: [{ role: 'user', content: prompt }] })
                });
                const data = await resp.json();
                const text = data.content[0].text;
                content.innerHTML = text.split('\n').filter(l => l.trim()).map((l, i) => `<div class="insight-card"><div class="insight-text">${l}</div></div>`).join('');
            } catch (e) {
                content.innerHTML = '<div class="insight-card"><div class="insight-text">Keep building consistency! 🔥</div></div>';
            }
        }



        function switchView(view) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
            
            if (view === 'checklist') {
                document.getElementById('checklistSection').classList.add('active');
                document.querySelectorAll('.view-toggle button')[0].classList.add('active');
            } else if (view === 'tracker') {
                document.getElementById('trackerSection').classList.add('active');
                document.querySelectorAll('.view-toggle button')[1].classList.add('active');
                renderTracker();
            } else if (view === 'insights') {
                document.getElementById('insightsSection').classList.add('active');
                document.querySelectorAll('.view-toggle button')[2].classList.add('active');
                renderInsights();
            }
        }

        document.getElementById('dailyNotes').addEventListener('blur', () => {
            localStorage.setItem(`notes_${currentViewDate.toISOString().split('T')[0]}`, document.getElementById('dailyNotes').value);
        });

        document.getElementById('dailyNotes').addEventListener('focus', () => {
            document.getElementById('dailyNotes').value = localStorage.getItem(`notes_${currentViewDate.toISOString().split('T')[0]}`) || '';
        });

        renderChecklist();
    </script>
</body>
</html>
